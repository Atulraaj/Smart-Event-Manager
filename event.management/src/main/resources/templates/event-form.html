<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-indigo: #4f46e5;
            --ink: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --surface: #ffffff;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        .app-navbar {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(16px);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            color: #ffffff;
            flex: 0 0 auto;
        }

        .form-card {
            max-width: 820px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
        }

        .form-control {
            border-color: #d8dee9;
            border-radius: 12px;
            padding: 0.85rem 1rem;
        }

        .form-control:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.13);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            border: 0;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
        }

        .btn-outline-secondary {
            border-radius: 12px;
        }

        .text-muted-custom {
            color: var(--muted);
        }

        @media (max-width: 991.98px) {
            .navbar-nav .nav-link,
            .navbar-nav .btn {
                min-height: 48px;
                display: flex;
                align-items: center;
                padding-left: 0.85rem;
                padding-right: 0.85rem;
            }

            .navbar-nav .btn {
                justify-content: center;
                margin-top: 0.5rem;
                width: 100%;
            }
        }

        @media (max-width: 575.98px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .form-card {
                border-radius: 18px;
            }

            .form-control,
            .btn-primary,
            .btn-outline-secondary {
                min-height: 52px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3 fw-bold" th:href="@{/admin/dashboard}">
            <span class="brand-mark d-inline-flex align-items-center justify-content-center fw-bold">SE</span>
            <span>Smart Event</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#eventFormNav" aria-controls="eventFormNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="eventFormNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2 pt-3 pt-lg-0">
                <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
                <a class="nav-link" th:href="@{/admin/events}">Events</a>
                <a class="btn btn-outline-secondary ms-lg-2" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    <section class="form-card mx-auto">
        <div class="p-4 p-sm-5">
            <div class="d-flex align-items-start justify-content-between gap-3 mb-4">
                <div>
                    <p class="text-uppercase text-primary fw-semibold small mb-2">Event Setup</p>
                    <h1 class="h2 fw-bold mb-2" th:text="${event.id == null ? 'Create Event' : 'Edit Event'}">Event Form</h1>
                    <p class="text-muted-custom mb-0">Enter the event details attendees will see in the portal.</p>
                </div>
                <a class="btn btn-outline-secondary d-none d-sm-inline-flex align-items-center" th:href="@{/admin/events}">
                    <i class="bi bi-arrow-left me-2"></i>Back
                </a>
            </div>

            <form th:action="${event.id == null ? '/admin/events' : '/admin/events/update/' + event.id}"
                  th:object="${event}"
                  method="post">
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold" for="title">Title</label>
                        <input class="form-control form-control-lg" id="title" type="text" th:field="*{title}" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold" for="description">Description</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="4"></textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold" for="venue">Venue</label>
                        <input class="form-control form-control-lg" id="venue" type="text" th:field="*{venue}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold" for="startDateTime">Start Date and Time</label>
                        <input class="form-control form-control-lg" id="startDateTime" type="datetime-local" th:field="*{startDateTime}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold" for="endDateTime">End Date and Time</label>
                        <input class="form-control form-control-lg" id="endDateTime" type="datetime-local" th:field="*{endDateTime}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold" for="capacity">Capacity</label>
                        <input class="form-control form-control-lg" id="capacity" type="number" th:field="*{capacity}" min="1" required>
                    </div>
                </div>

                <div class="d-grid d-sm-flex gap-3 mt-5">
                    <button class="btn btn-primary btn-lg px-5" type="submit">
                        <i class="bi bi-check2-circle me-2"></i>Save Event
                    </button>
                    <a class="btn btn-outline-secondary btn-lg px-4" th:href="@{/admin/events}">
                        <i class="bi bi-arrow-left me-2"></i>Back to Events
                    </a>
                </div>
            </form>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
