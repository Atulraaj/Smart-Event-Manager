<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-indigo: #4f46e5;
            --ink: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --surface: #ffffff;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        .app-navbar {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(16px);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            color: #ffffff;
            flex: 0 0 auto;
        }

        .hero-panel {
            background:
                    radial-gradient(circle at top right, rgba(255, 255, 255, 0.30), transparent 22rem),
                    linear-gradient(135deg, #1d4ed8 0%, #4338ca 58%, #312e81 100%);
            color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(37, 99, 235, 0.22);
        }

        .hero-panel p {
            color: rgba(255, 255, 255, 0.78);
        }

        .feedback-card {
            max-width: 760px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
        }

        .event-pill {
            background: rgba(37, 99, 235, 0.10);
            color: var(--brand-blue);
            border-radius: 999px;
        }

        .form-select,
        .form-control {
            border-color: #d8dee9;
            border-radius: 12px;
            padding: 0.85rem 1rem;
        }

        .form-select:focus,
        .form-control:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.13);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            border: 0;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
        }

        .btn-outline-secondary {
            border-radius: 12px;
        }

        .alert {
            border-radius: 12px;
        }

        .text-muted-custom {
            color: var(--muted);
        }

        @media (max-width: 991.98px) {
            .navbar-nav .nav-link,
            .navbar-nav .btn {
                min-height: 48px;
                display: flex;
                align-items: center;
                padding-left: 0.85rem;
                padding-right: 0.85rem;
            }

            .navbar-nav .btn {
                justify-content: center;
                margin-top: 0.5rem;
                width: 100%;
            }
        }

        @media (max-width: 575.98px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .hero-panel,
            .feedback-card {
                border-radius: 16px;
            }

            .btn-primary,
            .btn-outline-secondary,
            .form-select,
            .form-control {
                min-height: 52px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3 fw-bold" th:href="@{/user/dashboard}">
            <span class="brand-mark d-inline-flex align-items-center justify-content-center fw-bold">SE</span>
            <span>Smart Event</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#feedbackFormNav" aria-controls="feedbackFormNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="feedbackFormNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2 pt-3 pt-lg-0">
                <a class="nav-link" th:href="@{/user/events}">Events</a>
                <a class="nav-link" th:href="@{/user/registrations}">My Registrations</a>
                <a class="btn btn-outline-secondary ms-lg-2" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    <section class="hero-panel p-4 p-lg-5 mb-4">
        <div class="row align-items-center g-4">
            <div class="col-lg-8">
                <p class="text-uppercase fw-semibold small mb-3">Event Feedback</p>
                <h1 class="display-6 fw-bold mb-3">Submit Feedback</h1>
                <p class="fs-5 mb-0">Share your rating and comments for the event you attended.</p>
            </div>
            <div class="col-lg-4 text-lg-end">
                <a class="btn btn-light btn-lg fw-semibold" th:href="@{/user/registrations}">
                    <i class="bi bi-arrow-left me-2"></i>My Registrations
                </a>
            </div>
        </div>
    </section>

    <section class="feedback-card mx-auto">
        <div class="p-4 p-sm-5">
            <div class="mb-4">
                <span class="event-pill d-inline-flex align-items-center px-3 py-2 fw-semibold mb-3">
                    <i class="bi bi-calendar-event me-2"></i>
                    <span th:text="${event.title}">Event</span>
                </span>
                <h2 class="h3 fw-bold mb-2">How was the event?</h2>
                <p class="text-muted-custom mb-0">Your feedback helps improve future events.</p>
            </div>

            <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/user/events/{id}/feedback(id=${event.id})}" method="post">
                <div class="mb-4">
                    <label class="form-label fw-semibold" for="rating">Rating</label>
                    <select class="form-select form-select-lg" id="rating" name="rating" required>
                        <option value="">Select a rating</option>
                        <option value="1">1 - Poor</option>
                        <option value="2">2 - Fair</option>
                        <option value="3">3 - Good</option>
                        <option value="4">4 - Very Good</option>
                        <option value="5">5 - Excellent</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold" for="comments">Comments</label>
                    <textarea class="form-control" id="comments" name="comments" rows="5" placeholder="Write your comments here"></textarea>
                </div>

                <div class="d-grid d-sm-flex gap-3">
                    <button class="btn btn-primary btn-lg px-5" type="submit">
                        <i class="bi bi-send me-2"></i>Submit Feedback
                    </button>
                    <a class="btn btn-outline-secondary btn-lg px-4" th:href="@{/user/registrations}">
                        <i class="bi bi-arrow-left me-2"></i>Back to My Registrations
                    </a>
                </div>
            </form>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
